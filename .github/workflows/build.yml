name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: macos-dmg-arm
          - target: x86_64-apple-darwin
            artifact: macos-dmg-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: npm ci
      - run: npm run tauri build -- --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-msi/*.msi
            macos-dmg-arm/*.dmg
            macos-dmg-intel/*.dmg
          body: |
            ## 🚬 쓰담 위젯 — 쓰고, 담배를 피우다

            ### 다운로드
            | 플랫폼 | 파일 |
            |--------|------|
            | **Windows** | `.msi` 다운로드 후 실행 |
            | **macOS (Apple Silicon)** | `_aarch64.dmg` 다운로드 |
            | **macOS (Intel)** | `_x64.dmg` 다운로드 |

            ### 주요 기능
            - 🚬 리얼 담배 시뮬레이션 (재/불씨/종이/필터/연기)
            - ⏱ 뽀모도로 타이머 (담배가 타는 것 = 시간 흐름)
            - 💨 필터 홀드로 깊게 흡입 (3배속 연소)
            - 📝 리치 텍스트 메모 (볼드/이탤릭/밑줄)
            - ⚙️ 커스터마이징 (스킨, 연기, 투명도)

            ### 제작
            정진호 & 박찬진
            Inspired by [온라인 담타](https://www.damta.world/)
